<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wendy 溫蒂．貓與狗訓練日常</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #f0e6d6;
    --bg-soft: #f7f0e3;
    --brown: #8b6f47;
    --brown-dark: #6b5435;
    --brown-light: #c9b693;
    --text: #3d2f1f;
    --text-soft: #6b5435;
    --good: #6b9e6e;
    --ok: #c9a85a;
    --work: #c97a4f;
    --shadow: 0 2px 8px rgba(139, 111, 71, 0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                 "Microsoft JhengHei", sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
  }
  .app { max-width: 720px; margin: 0 auto; padding-bottom: 80px; }
  header.top {
    background: var(--brown);
    color: var(--bg);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: var(--shadow);
  }
  header.top h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    flex: 1;
    text-align: center;
  }
  .icon-btn {
    background: transparent;
    border: none;
    color: var(--bg);
    font-size: 18px;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 6px;
    min-width: 36px;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.15); }
  .icon-btn:disabled { opacity: 0.3; cursor: default; }

  main { padding: 16px; }

  .crumb {
    font-size: 13px;
    color: var(--text-soft);
    margin-bottom: 12px;
  }

  .card {
    background: var(--bg-soft);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.05s;
  }
  .card:hover { transform: translateY(-1px); }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .card-title { font-weight: 600; font-size: 16px; color: var(--brown-dark); }
  .card-meta { font-size: 13px; color: var(--text-soft); margin-top: 4px; }
  .badge {
    background: var(--brown);
    color: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
  }

  .btn {
    background: var(--brown);
    color: var(--bg);
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: var(--shadow);
  }
  .btn:hover { background: var(--brown-dark); }
  .btn.ghost {
    background: transparent;
    color: var(--brown);
    border: 1px solid var(--brown);
    box-shadow: none;
  }
  .btn.ghost:hover { background: var(--brown); color: var(--bg); }
  .btn.danger { background: var(--work); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .fab {
    position: fixed;
    bottom: 24px;
    right: max(24px, calc(50vw - 360px + 24px));
    background: var(--brown);
    color: var(--bg);
    border: none;
    width: 56px;
    height: 56px;
    border-radius: 28px;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(139,111,71,0.35);
    z-index: 5;
  }
  .fab:hover { background: var(--brown-dark); }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-soft);
  }
  .empty h3 { color: var(--brown-dark); margin-bottom: 8px; }

  /* Brand hero (only on main pets view) */
  .brand-hero {
    text-align: center;
    padding: 20px 16px 8px;
    margin: -16px -16px 16px;
    background: var(--bg);
  }
  .brand-hero img {
    max-width: 280px;
    width: 80%;
    height: auto;
  }

  /* Forms */
  label { display: block; font-size: 13px; color: var(--text-soft); margin-bottom: 6px; }
  input[type=text], input[type=date], input[type=number], input[type=password],
  textarea, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--brown-light);
    border-radius: 8px;
    background: white;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
  }
  input:focus, textarea:focus, select:focus {
    outline: 2px solid var(--brown);
    outline-offset: -1px;
  }
  textarea { resize: vertical; min-height: 80px; }
  .field { margin-bottom: 14px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-opt {
    flex: 1;
    min-width: 80px;
    padding: 10px 12px;
    background: white;
    border: 1px solid var(--brown-light);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .radio-opt input[type=radio] { accent-color: var(--brown); }
  .radio-opt:has(input:checked) {
    background: var(--bg-soft);
    border-color: var(--brown);
    color: var(--brown-dark);
    font-weight: 500;
  }

  /* Modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(61,47,31,0.4);
    display: flex; align-items: flex-end;
    justify-content: center;
    z-index: 20;
  }
  .modal {
    background: var(--bg);
    width: 100%;
    max-width: 720px;
    border-radius: 16px 16px 0 0;
    padding: 20px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { color: var(--brown-dark); margin-bottom: 14px; font-size: 18px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions .btn { flex: 1; }

  /* Training items */
  .item {
    background: var(--bg-soft);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    border: 2px solid transparent;
    transition: border-color 0.1s;
  }
  .item.selected { border-color: var(--brown); }
  .item-head {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .item-name { flex: 1; font-weight: 500; }
  .steps-badge {
    display: inline-block;
    font-size: 11px;
    margin-left: 4px;
    opacity: 0.7;
  }
  .check {
    width: 22px; height: 22px;
    border: 2px solid var(--brown-light);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .item.selected .check {
    background: var(--brown);
    border-color: var(--brown);
    color: var(--bg);
  }
  .ratings {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    padding-left: 32px;
  }
  .rating-btn {
    flex: 1;
    padding: 8px 4px;
    border: 1px solid var(--brown-light);
    border-radius: 6px;
    background: white;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-soft);
  }
  .rating-btn.active.good { background: var(--good); color: white; border-color: var(--good); }
  .rating-btn.active.ok { background: var(--ok); color: white; border-color: var(--ok); }
  .rating-btn.active.work { background: var(--work); color: white; border-color: var(--work); }

  .pet-note-input {
    margin-top: 8px;
    margin-left: 32px;
    width: calc(100% - 32px);
    padding: 6px 10px;
    border: 1px dashed var(--brown-light);
    border-radius: 6px;
    background: white;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    min-height: 32px;
    resize: vertical;
  }
  .pet-note-input:focus {
    outline: 1px solid var(--brown);
    border-style: solid;
  }

  .methods-section {
    margin-top: 8px;
    margin-left: 32px;
    padding: 8px 10px;
    background: white;
    border-radius: 6px;
    border: 1px solid var(--brown-light);
  }
  .methods-label {
    font-size: 11px;
    color: var(--brown);
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .method-check {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    cursor: pointer;
    font-size: 14px;
  }
  .method-check input[type=checkbox] {
    accent-color: var(--brown);
    width: 18px; height: 18px;
    cursor: pointer;
  }

  .notice {
    background: var(--brown-light);
    color: var(--brown-dark);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .autosave-banner {
    background: #d4e7d3;
    color: #3d6b3f;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
    border-left: 3px solid #6b9e6e;
  }
  .notice.ok { background: #d4e7d3; color: #3d6b3f; }
  .notice.err { background: #f5d4c2; color: #8a3920; }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
    background: var(--bg-soft);
    padding: 4px;
    border-radius: 8px;
  }
  .tab {
    flex: 1;
    padding: 8px;
    background: transparent;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-soft);
  }
  .tab.active { background: var(--brown); color: var(--bg); }

  .item-list-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-soft);
    border-radius: 8px;
    margin-bottom: 6px;
  }
  .item-list-row input {
    border: none;
    background: transparent;
    flex: 1;
    padding: 4px;
  }
  .item-list-row input:focus { outline: 1px solid var(--brown); border-radius: 4px; }
  .item-edit-block {
    background: var(--bg-soft);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .item-edit-top {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .item-edit-top input {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid var(--brown-light);
    border-radius: 6px;
    background: white;
    font-size: 14px;
  }
  .item-edit-block textarea {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--brown-light);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-soft);
    background: white;
    min-height: 50px;
    resize: vertical;
  }
  .methods-wrap {
    margin-top: 8px;
    margin-left: 12px;
    border-left: 2px solid var(--brown-light);
    padding-left: 12px;
  }
  .method-block {
    background: white;
    border-radius: 6px;
    padding: 8px;
    margin-bottom: 6px;
    border: 1px solid var(--brown-light);
  }
  .method-top {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .method-top input {
    flex: 1;
    padding: 5px 8px;
    border: 1px solid var(--brown-light);
    border-radius: 4px;
    font-size: 13px;
  }
  .method-block textarea {
    min-height: 40px;
    font-size: 12px;
  }
  .add-method {
    margin-top: 4px;
  }
  .small-btn {
    background: transparent;
    border: 1px solid var(--brown-light);
    color: var(--brown);
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .small-btn.danger { color: var(--work); border-color: var(--work); }

  .actions-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .actions-row .btn { flex: 1; min-width: 120px; }

  /* iOS safe area */
  @supports (padding: env(safe-area-inset-bottom)) {
    .app { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <button class="icon-btn" id="backBtn" title="返回">‹</button>
    <h1 id="appTitle">Wendy 溫蒂．貓與狗訓練日常</h1>
    <button class="icon-btn" id="settingsBtn" title="設定">⚙</button>
  </header>
  <main id="main"></main>
</div>

<script>
/* ============== LOGO PRELOAD ============== */
let LOGO_DATA = null, LOGO_W = 0, LOGO_H = 0;
(function preloadLogo() {
  const img = new Image();
  img.onload = () => {
    try {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth;
      c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      LOGO_DATA = c.toDataURL('image/png');
      LOGO_W = img.naturalWidth;
      LOGO_H = img.naturalHeight;
    } catch (e) { /* tainted canvas (cross-origin) — PDF will skip logo */ }
  };
  img.src = 'logo.png';
})();

/* ============== STATE & STORAGE ============== */
const KEYS = {
  pets: 'petcare.pets',
  sessions: 'petcare.sessions',
  itemsCat: 'petcare.trainingItems.cat',
  itemsDog: 'petcare.trainingItems.dog',
  settings: 'petcare.settings',
  version: 'petcare.version',
};

const DEFAULT_DOG_ITEMS = [
  '坐下 Sit', '趴下 Down', '等等 Stay', '過來 Come', '跟隨散步 Heel',
  '不暴衝（牽繩禮儀）', '定點大小便', '籠內訓練', '看我（專注）',
  '放下 Drop it', '不要 Leave it', '握手 / 擊掌',
  '社會化：人', '社會化：狗', '社會化：環境聲音',
  '接受梳毛 / 剪指甲', '不撲人', '進出門禮儀',
].map(name => ({ name, methods: [] }));

const DEFAULT_CAT_ITEMS = [
  '響片連結', '目標棒觸碰', '進外出籠（Crate）',
  '接受梳毛', '接受剪指甲', '接受刷牙',
  '定點待命', '擊掌 / 握手', '跟隨手勢',
  '坐下', '轉圈', '不上餐桌', '不咬手 / 不抓人',
  '接受陌生人靠近', '健康檢查姿勢（觸碰耳/嘴/腹）',
  '環境減敏：聲音', '環境減敏：陌生環境',
].map(name => ({ name, methods: [] }));

// 把任何舊版資料自動升級成 v3：{ name, methods: [{name, steps}] }
function ensureItemShape(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.map(it => {
    if (typeof it === 'string') {
      // v1
      return { name: it, methods: [] };
    }
    if (Array.isArray(it.methods)) {
      // v3 already
      return {
        name: it.name || '',
        methods: it.methods.map(m => ({
          name: (m && m.name) || '',
          steps: (m && m.steps) || '',
        })),
      };
    }
    // v2: had {name, steps}
    if (it.steps && it.steps.trim()) {
      return { name: it.name || '', methods: [{ name: '基本方法', steps: it.steps }] };
    }
    return { name: it.name || '', methods: [] };
  });
}

function load(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function save(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function initStorage() {
  if (!localStorage.getItem(KEYS.version)) {
    save(KEYS.version, 2);
  }
  if (!localStorage.getItem(KEYS.pets)) save(KEYS.pets, []);
  if (!localStorage.getItem(KEYS.sessions)) save(KEYS.sessions, []);
  if (!localStorage.getItem(KEYS.itemsCat)) save(KEYS.itemsCat, DEFAULT_CAT_ITEMS);
  if (!localStorage.getItem(KEYS.itemsDog)) save(KEYS.itemsDog, DEFAULT_DOG_ITEMS);
  if (!localStorage.getItem(KEYS.settings)) save(KEYS.settings, {
    githubPat: '',
    githubUser: 'wendypettrainer',
    githubRepo: 'pet-care',
  });
  // Migration: 任何舊格式（string[] / {name,steps}）→ v3 {name, methods[]}
  save(KEYS.itemsCat, ensureItemShape(load(KEYS.itemsCat, [])));
  save(KEYS.itemsDog, ensureItemShape(load(KEYS.itemsDog, [])));
  save(KEYS.version, 3);
}

const state = {
  view: 'pets',  // pets | sessions | session | settings
  petId: null,
  sessionId: null,
};

/* ============== UTIL ============== */
function fmtDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${y}/${m}/${d}`;
}
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function speciesLabel(s) { return s === 'cat' ? '貓' : '狗'; }
function speciesEmoji(s) { return s === 'cat' ? '🐱' : '🐶'; }
function genderLabel(g) { return g === 'male' ? '♂' : g === 'female' ? '♀' : ''; }
function neuteredLabel(n) { return n === 'yes' ? '已絕育' : n === 'no' ? '未絕育' : ''; }
function petTagline(p) {
  // 一行短描述：品種 · ♂ · 已絕育 · 4 個月齡
  return [
    p.breed || speciesLabel(p.species),
    genderLabel(p.gender),
    neuteredLabel(p.neutered),
    p.birth,
  ].filter(Boolean).join(' · ');
}

function getPet(id) { return load(KEYS.pets, []).find(p => p.id === id); }
function getSession(id) { return load(KEYS.sessions, []).find(s => s.id === id); }
function getPetSessions(petId) {
  return load(KEYS.sessions, [])
    .filter(s => s.petId === petId)
    .sort((a,b) => b.date.localeCompare(a.date));
}

function showNotice(msg, type = 'ok') {
  const n = document.createElement('div');
  n.className = 'notice ' + type;
  n.textContent = msg;
  n.style.position = 'fixed';
  n.style.top = '70px';
  n.style.left = '50%';
  n.style.transform = 'translateX(-50%)';
  n.style.zIndex = '100';
  n.style.maxWidth = '90%';
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 3000);
}

/* ============== ROUTER ============== */
function go(view, params = {}) {
  state.view = view;
  if ('petId' in params) state.petId = params.petId;
  if ('sessionId' in params) state.sessionId = params.sessionId;
  render();
}

function updateHeader() {
  const back = document.getElementById('backBtn');
  const title = document.getElementById('appTitle');
  if (state.view === 'pets') {
    back.disabled = true;
    title.textContent = 'Wendy 溫蒂．貓與狗訓練日常';
  } else if (state.view === 'sessions') {
    back.disabled = false;
    const p = getPet(state.petId);
    title.textContent = p ? `${speciesEmoji(p.species)} ${p.name}` : '';
  } else if (state.view === 'session') {
    back.disabled = false;
    const s = getSession(state.sessionId);
    title.textContent = s ? `📒 ${fmtDate(s.date)}` : '';
  } else if (state.view === 'settings') {
    back.disabled = false;
    title.textContent = '⚙ 設定';
  }
}

document.getElementById('backBtn').onclick = () => {
  if (state.view === 'sessions') go('pets');
  else if (state.view === 'session') go('sessions', { petId: state.petId });
  else if (state.view === 'settings') go(state._returnView || 'pets');
};
document.getElementById('settingsBtn').onclick = () => {
  state._returnView = state.view;
  go('settings');
};

/* ============== VIEW: PETS ============== */
function renderPets() {
  const main = document.getElementById('main');
  const pets = load(KEYS.pets, []);
  const hero = `
    <div class="brand-hero">
      <img src="logo.png" alt="Wendy 溫蒂．貓與狗訓練日常"
           onerror="this.style.display='none'">
    </div>`;
  if (pets.length === 0) {
    main.innerHTML = hero + `
      <div class="empty">
        <h3>還沒有寵物資料</h3>
        <p>點右下角 ＋ 新增第一隻</p>
      </div>
      <button class="fab" id="fab">＋</button>
    `;
  } else {
    const cards = pets.map(p => {
      const count = getPetSessions(p.id).length;
      return `
        <div class="card" data-id="${p.id}">
          <div class="card-row">
            <div>
              <div class="card-title">${speciesEmoji(p.species)} ${escapeHtml(p.name)}</div>
              <div class="card-meta">${escapeHtml(petTagline(p))} · 飼主：${escapeHtml(p.ownerName || '—')}</div>
            </div>
            <span class="badge">${count} 堂</span>
          </div>
        </div>`;
    }).join('');
    main.innerHTML = hero + cards + `<button class="fab" id="fab">＋</button>`;
    main.querySelectorAll('.card').forEach(el => {
      el.onclick = () => go('sessions', { petId: el.dataset.id });
    });
  }
  document.getElementById('fab').onclick = () => openPetForm();
}

function openPetForm(pet = null) {
  const isEdit = !!pet;
  const data = pet || {
    id: '', species: 'dog', name: '', breed: '', birth: '',
    gender: '', neutered: '',
    ownerName: '', ownerContact: '', notes: '',
  };
  const html = `
    <div class="modal">
      <h2>${isEdit ? '編輯寵物' : '新增寵物'}</h2>
      <div class="field">
        <label>物種</label>
        <select id="f_species">
          <option value="dog" ${data.species==='dog'?'selected':''}>🐶 狗</option>

        <div class="field">
          <label>名字 *</label>

        </div>
        <div class="field">
          <label>品種</label>
          <input id="f_breed" type="text" value="${escapeAttr(data.breed)}" placeholder="例：柴犬">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>性別</label>
          <select id="f_gender">
            <option value="" ${!data.gender?'selected':''}>未填</option>
            <option value="male" ${data.gender==='male'?'selected':''}>♂ 公</option>
            <option value="female" ${data.gender==='female'?'selected':''}>♀ 母</option>
          </select>
        </div>
        <div class="field">
          <label>絕育</label>
          <select id="f_neutered">
            <option value="" ${!data.neutered?'selected':''}>未填</option>
            <option value="yes" ${data.neutered==='yes'?'selected':''}>是</option>
            <option value="no" ${data.neutered==='no'?'selected':''}>否</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>出生年月 / 月齡</label>
          <input id="f_birth" type="text" value="${escapeAttr(data.birth)}" placeholder="2023-05 或 4 個月齡">

        <div class="field">
          <label>飼主姓名</label>
          <input id="f_owner" type="text" value="${escapeAttr(data.ownerName)}" placeholder="例：陳小姐">
        </div>
      </div>
      <div class="field">
        <label>飼主聯絡（電話 / LINE / Email）</label>
        <input id="f_contact" type="text" value="${escapeAttr(data.ownerContact)}" placeholder="可選">
      </div>
      <div class="field">
        <label>備註（個性 / 過敏 / 特殊狀況）</label>
        <textarea id="f_notes">${escapeHtml(data.notes)}</textarea>

      <div class="modal-actions">
        ${isEdit ? '<button class="btn danger" id="m_del">刪除</button>' : ''}
        <button class="btn ghost" id="m_cancel">取消</button>
        <button class="btn" id="m_save">${isEdit ? '儲存' : '建立'}</button>
      </div>
    </div>
  `;
  const overlay = openModal(html);
  overlay.querySelector('#m_cancel').onclick = () => overlay.remove();
  overlay.querySelector('#m_save').onclick = () => {
    const name = overlay.querySelector('#f_name').value.trim();
    if (!name) { showNotice('請填名字', 'err'); return; }
    const updated = {
      id: data.id || uid(),
      species: overlay.querySelector('#f_species').value,
      name,
      breed: overlay.querySelector('#f_breed').value.trim(),
      birth: overlay.querySelector('#f_birth').value.trim(),
      gender: overlay.querySelector('#f_gender').value,
      neutered: overlay.querySelector('#f_neutered').value,
      ownerName: overlay.querySelector('#f_owner').value.trim(),
      ownerContact: overlay.querySelector('#f_contact').value.trim(),
      notes: overlay.querySelector('#f_notes').value.trim(),
      createdAt: data.createdAt || new Date().toISOString(),
    };
    const pets = load(KEYS.pets, []);
    if (isEdit) {
      const idx = pets.findIndex(p => p.id === data.id);
      pets[idx] = updated;
    } else {
      pets.push(updated);
    }
    save(KEYS.pets, pets);
    overlay.remove();
    render();
  };
  if (isEdit) {
    overlay.querySelector('#m_del').onclick = () => {
      if (!confirm(`刪除 ${data.name}？此寵物的所有課程記錄也會一併刪除。`)) return;
      save(KEYS.pets, load(KEYS.pets, []).filter(p => p.id !== data.id));
      save(KEYS.sessions, load(KEYS.sessions, []).filter(s => s.petId !== data.id));
      overlay.remove();
      go('pets');
    };
  }
}

/* ============== VIEW: SESSIONS ============== */
function renderSessions() {
  const main = document.getElementById('main');
  const pet = getPet(state.petId);
  if (!pet) { go('pets'); return; }
  const sessions = getPetSessions(pet.id);
  const meta = `
    <div class="card" style="cursor:default; background:transparent; box-shadow:none; padding:8px 4px">
      <div class="card-meta">
        ${escapeHtml(petTagline(pet))} ·
        飼主 ${escapeHtml(pet.ownerName || '—')}
        ${pet.ownerContact ? ' · ' + escapeHtml(pet.ownerContact) : ''}
      </div>
      ${pet.notes ? `<div class="card-meta" style="margin-top:6px">📝 ${escapeHtml(pet.notes)}</div>` : ''}
      <div style="margin-top:10px; display:flex; gap:8px">
        <button class="small-btn" id="editPet">編輯寵物資料</button>
      </div>
    </div>
  `;
  let body;
  if (sessions.length === 0) {
    body = `<div class="empty"><h3>還沒有課程</h3><p>點右下角 ＋ 新增第一堂</p></div>`;
  } else {
    body = sessions.map(s => {
      const recCount = (s.records || []).filter(r => r.selected).length;
      const isToday = s.date === todayStr();
      return `
        <div class="card" data-id="${s.id}">
          <div class="card-row">
            <div>
              <div class="card-title">${fmtDate(s.date)} ${isToday ? '<span class="badge" style="background:var(--good)">今天</span>' : ''}</div>
              <div class="card-meta">
                ${s.location ? '📍 ' + escapeHtml(s.location) + ' · ' : ''}
                ${s.duration ? s.duration + ' 分鐘' : ''}
                ${recCount > 0 ? ' · 已記錄 ' + recCount + ' 項' : ' · 尚未記錄'}
              </div>
            </div>
            <span class="badge">›</span>
          </div>
        </div>`;
    }).join('');
  }
  main.innerHTML = meta + body + `<button class="fab" id="fab">＋</button>`;
  document.getElementById('editPet').onclick = () => openPetForm(pet);
  main.querySelectorAll('.card[data-id]').forEach(el => {
    el.onclick = () => go('session', { sessionId: el.dataset.id });
  });
  document.getElementById('fab').onclick = () => openSessionForm();
}

function openSessionForm(session = null) {
  const isEdit = !!session;
  const data = session || {
    id: '', petId: state.petId, date: todayStr(),
    location: '', duration: 60,
  };
  // 把舊的 freeform location 對應到 radio：教室/家中 直接命中，其他都歸到「其他」+文字
  const presetLocs = ['教室', '家中'];
  const isPreset = presetLocs.includes(data.location);
  const initType = !data.location ? '' : (isPreset ? data.location : 'other');
  const initOther = isPreset ? '' : (data.location || '');
  const html = `
    <div class="modal">
      <h2>${isEdit ? '編輯課程' : '新增課程'}</h2>
      <div class="row2">
        <div class="field">
          <label>日期 *</label>
          <input id="f_date" type="date" value="${data.date}">
        </div>
        <div class="field">
          <label>時長（分鐘）</label>
          <input id="f_duration" type="number" value="${data.duration||''}" min="0">
        </div>
      </div>
      <div class="field">
        <label>地點</label>
        <div class="radio-group">
          <label class="radio-opt"><input type="radio" name="locType" value="教室" ${initType==='教室'?'checked':''}> 教室</label>
          <label class="radio-opt"><input type="radio" name="locType" value="家中" ${initType==='家中'?'checked':''}> 家中</label>
          <label class="radio-opt"><input type="radio" name="locType" value="other" ${initType==='other'?'checked':''}> 其他</label>
        </div>
        <input id="f_locOther" type="text" value="${escapeAttr(initOther)}" placeholder="請輸入地點"
               style="margin-top:8px; display:${initType==='other'?'block':'none'};">
      </div>
      <div class="modal-actions">
        ${isEdit ? '<button class="btn danger" id="m_del">刪除</button>' : ''}
        <button class="btn ghost" id="m_cancel">取消</button>
        <button class="btn" id="m_save">${isEdit ? '儲存' : '建立並開始記錄'}</button>
      </div>
    </div>
  `;
  const overlay = openModal(html);
  overlay.querySelector('#m_cancel').onclick = () => overlay.remove();
  // Toggle 其他 文字輸入
  overlay.querySelectorAll('input[name="locType"]').forEach(r => {
    r.onchange = () => {
      const ot = overlay.querySelector('#f_locOther');
      ot.style.display = (r.value === 'other' && r.checked) ? 'block' : 'none';
      if (r.value === 'other' && r.checked) ot.focus();
    };
  });
  overlay.querySelector('#m_save').onclick = () => {
    const date = overlay.querySelector('#f_date').value;
    if (!date) { showNotice('請選日期', 'err'); return; }
    const locTypeEl = overlay.querySelector('input[name="locType"]:checked');
    const locType = locTypeEl ? locTypeEl.value : '';
    const locOther = overlay.querySelector('#f_locOther').value.trim();
    const finalLoc = locType === 'other' ? locOther : (locType || '');
    const updated = {
      id: data.id || uid(),
      petId: data.petId,
      date,
      duration: parseInt(overlay.querySelector('#f_duration').value) || 0,
      location: finalLoc,
      records: data.records || [],
      homework: data.homework || '',
      notes: data.notes || '',
      gistId: data.gistId,
      createdAt: data.createdAt || new Date().toISOString(),
    };
    const sessions = load(KEYS.sessions, []);
    if (isEdit) {
      const idx = sessions.findIndex(s => s.id === data.id);
      sessions[idx] = updated;
    } else {
      sessions.push(updated);
    }
    save(KEYS.sessions, sessions);
    overlay.remove();
    if (isEdit) render();
    else go('session', { sessionId: updated.id });
  };
  if (isEdit) {
    overlay.querySelector('#m_del').onclick = () => {
      if (!confirm('刪除這堂課的所有記錄？')) return;
      save(KEYS.sessions, load(KEYS.sessions, []).filter(s => s.id !== data.id));
      overlay.remove();
      go('sessions', { petId: state.petId });
    };
  }
}

/* ============== VIEW: SESSION RECORD ============== */
function renderSession() {
  const main = document.getElementById('main');
  const sess = getSession(state.sessionId);
  if (!sess) { go('sessions', { petId: state.petId }); return; }
  const pet = getPet(sess.petId);
  if (!pet) { go('pets'); return; }
  const items = ensureItemShape(pet.species === 'cat' ? load(KEYS.itemsCat, []) : load(KEYS.itemsDog, []));
  const recordsByName = {};
  (sess.records || []).forEach(r => recordsByName[r.name] = r);

  const itemsHtml = items.map(it => {
    const name = it.name;
    const r = recordsByName[name] || { name, selected: false, rating: '', methods: [], petNote: '' };
    const itMethods = it.methods || [];
    const hasMethods = itMethods.length > 0;
    const checkedSet = new Set(r.methods || []);
    const methodsBlock = hasMethods ? `
      <div class="methods-section">
        <div class="methods-label">🎯 今天用的方法（可複選）</div>
        ${itMethods.map(m => `
          <label class="method-check">
            <input type="checkbox" data-method="${escapeAttr(m.name)}" ${checkedSet.has(m.name)?'checked':''}>
            <span>${escapeHtml(m.name || '（未命名方法）')}</span>
          </label>
        `).join('')}
      </div>` : '';
    return `
      <div class="item ${r.selected ? 'selected' : ''}" data-name="${escapeAttr(name)}">
        <div class="item-head">
          <div class="check">${r.selected ? '✓' : ''}</div>
          <div class="item-name">${escapeHtml(name)}${hasMethods ? ' <span class="steps-badge" title="此項目有 '+itMethods.length+' 種訓練方法">📋</span>' : ''}</div>
        </div>
        ${r.selected ? `
          <div class="ratings">
            <button class="rating-btn good ${r.rating==='good'?'active':''}" data-rating="good">😊 好</button>
            <button class="rating-btn ok ${r.rating==='ok'?'active':''}" data-rating="ok">😐 普通</button>
            <button class="rating-btn work ${r.rating==='work'?'active':''}" data-rating="work">💪 需加強</button>
          </div>
          ${methodsBlock}
          <textarea class="pet-note-input" data-pet-note="${escapeAttr(name)}"
            placeholder="💭 針對這隻寵物的調整備註（可選，會給飼主）"
            rows="1">${escapeHtml(r.petNote || '')}</textarea>
        ` : ''}
      </div>`;
  }).join('');

  main.innerHTML = `
    <div class="autosave-banner">
      💾 評分、方法勾選、備註都是<b>自動儲存</b>。儲存按鈕只是快速確認。
    </div>
    <div class="card" style="cursor:default">
      <div class="card-row">
        <div>
          <div class="card-title">${speciesEmoji(pet.species)} ${escapeHtml(pet.name)} ${genderLabel(pet.gender)}</div>
          <div class="card-meta">
            ${fmtDate(sess.date)}
            ${sess.location ? ' · 📍 ' + escapeHtml(sess.location) : ''}
            ${sess.duration ? ' · ' + sess.duration + ' 分鐘' : ''}
          </div>
        </div>
        <button class="small-btn" id="editSess">編輯</button>
      </div>
    </div>

    <h3 style="color:var(--brown-dark); margin: 18px 0 10px; font-size:15px">訓練項目（點選擇要記錄的項目）</h3>
    <div id="itemList">${itemsHtml}</div>

    <div class="field" style="margin-top:18px">
      <label>📝 本週飼主作業</label>
      <textarea id="homework" placeholder="例：每天早晚各 5 分鐘練習坐下，遛狗時遇到其他狗保持距離 3 公尺以上⋯">${escapeHtml(sess.homework||'')}</textarea>
    </div>
    <div class="field">
      <label>👀 訓練師備註（不會輸出給飼主）</label>
      <textarea id="trainerNotes" placeholder="自己的觀察、下次計畫⋯">${escapeHtml(sess.notes||'')}</textarea>
    </div>

    <div class="actions-row">
      <button class="btn" id="saveBtn">💾 儲存</button>
      <button class="btn ghost" id="pdfBtn">📄 下載 PDF</button>
      <button class="btn ghost" id="shareBtn">🔗 產生分享連結</button>
    </div>
  `;

  document.getElementById('editSess').onclick = () => openSessionForm(sess);

  // Item interaction
  main.querySelectorAll('.item').forEach(el => {
    const name = el.dataset.name;
    el.querySelector('.item-head').onclick = () => {
      const cur = recordsByName[name] || { name, selected: false, rating: '', petNote: '' };
      cur.selected = !cur.selected;
      if (!cur.selected) { cur.rating = ''; cur.petNote = ''; }
      recordsByName[name] = cur;
      saveRecords();
      renderSession();
    };
    el.querySelectorAll('.rating-btn').forEach(rb => {
      rb.onclick = (e) => {
        e.stopPropagation();
        const cur = recordsByName[name];
        cur.rating = cur.rating === rb.dataset.rating ? '' : rb.dataset.rating;
        saveRecords();
        renderSession();
      };
    });
    const noteInput = el.querySelector('.pet-note-input');
    if (noteInput) {
      noteInput.onblur = () => {
        const cur = recordsByName[name];
        if (cur) cur.petNote = noteInput.value;
        saveRecords();
      };
      noteInput.onclick = (e) => e.stopPropagation();
    }
    el.querySelectorAll('.method-check input[type=checkbox]').forEach(cb => {
      cb.onclick = (e) => {
        e.stopPropagation();
        const cur = recordsByName[name];
        if (!cur) return;
        cur.methods = cur.methods || [];
        const mname = cb.dataset.method;
        if (cb.checked) {
          if (!cur.methods.includes(mname)) cur.methods.push(mname);
        } else {
          cur.methods = cur.methods.filter(m => m !== mname);
        }
        saveRecords();
      };
    });
  });

  function saveRecords() {
    sess.records = Object.values(recordsByName).filter(r => r.selected);
    sess.homework = document.getElementById('homework').value;
    sess.notes = document.getElementById('trainerNotes').value;
    const sessions = load(KEYS.sessions, []);
    const idx = sessions.findIndex(s => s.id === sess.id);
    sessions[idx] = sess;
    save(KEYS.sessions, sessions);
  }

  document.getElementById('saveBtn').onclick = () => {
    saveRecords();
    showNotice('已儲存');
  };
  document.getElementById('pdfBtn').onclick = () => {
    saveRecords();
    exportPdf(sess, pet);
  };
  document.getElementById('shareBtn').onclick = async () => {
    saveRecords();
    await shareToGist(sess, pet);
  };

  // Auto-save homework / notes on blur
  ['homework','trainerNotes'].forEach(id => {
    document.getElementById(id).addEventListener('blur', saveRecords);
  });
}

/* ============== PDF EXPORT ============== */
function exportPdf(sess, pet) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, M = 18;
  let y = M;

  // Header: logo on left, date on right, brown accent line below
  if (LOGO_DATA) {
    const targetH = 18;
    const targetW = Math.min(70, (LOGO_W / LOGO_H) * targetH);
    doc.addImage(LOGO_DATA, 'PNG', M, 12, targetW, targetH);
  } else {
    doc.setTextColor(61, 47, 31);
    doc.setFontSize(14);
    doc.text('Wendy', M, 22);
    doc.setFontSize(10);
    doc.setTextColor(107, 84, 53);
    doc.text('溫蒂．貓與狗訓練日常', M, 28);
  }
  doc.setTextColor(107, 84, 53);
  doc.setFontSize(10);
  doc.text('Session Report', W - M, 18, { align: 'right' });
  doc.setFontSize(11);
  doc.setTextColor(61, 47, 31);
  doc.text(fmtDate(sess.date), W - M, 25, { align: 'right' });

  // Brown accent line
  doc.setDrawColor(139, 111, 71);
  doc.setLineWidth(0.6);
  doc.line(M, 36, W - M, 36);
  y = 46;

  // Pet info
  doc.setTextColor(61, 47, 31);
  doc.setFontSize(13);
  const genderTxt = pet.gender === 'male' ? ' (M)' : pet.gender === 'female' ? ' (F)' : '';
  doc.text(`${pet.species==='cat'?'[Cat]':'[Dog]'} ${pet.name}${genderTxt}`, M, y);
  y += 6;
  doc.setFontSize(10);
  doc.setTextColor(107, 84, 53);
  const meta = [
    pet.breed,
    pet.birth,
    pet.neutered === 'yes' ? 'Neutered' : pet.neutered === 'no' ? 'Intact' : '',
    pet.ownerName ? `Owner: ${pet.ownerName}` : '',
    sess.location ? `Loc: ${sess.location}` : '',
    sess.duration ? `${sess.duration} min` : '',
  ].filter(Boolean).join('  |  ');
  doc.text(meta, M, y);
  y += 8;

  // Items
  doc.setTextColor(61, 47, 31);
  doc.setFontSize(11);
  doc.text('訓練項目 / Training Items', M, y);
  y += 5;
  doc.setDrawColor(201, 182, 147);
  doc.line(M, y, W - M, y);
  y += 4;

  // 把方法 / steps 注入 records 給 PDF 用
  const items = ensureItemShape(pet.species === 'cat' ? load(KEYS.itemsCat, []) : load(KEYS.itemsDog, []));
  const itemMap = {};
  items.forEach(it => { itemMap[it.name] = it.methods || []; });

  const records = (sess.records || []).filter(r => r.selected);
  if (records.length === 0) {
    doc.setFontSize(10);
    doc.setTextColor(150, 130, 100);
    doc.text('（這堂課還沒有勾選項目）', M, y + 4);
    y += 10;
  } else {
    records.forEach(r => {
      doc.setFontSize(10);
      const ratingTxt = r.rating === 'good' ? '[Good]' : r.rating === 'ok' ? '[OK]' : r.rating === 'work' ? '[Need work]' : '';
      doc.setTextColor(61, 47, 31);
      doc.text('• ' + r.name, M + 2, y + 4);
      if (r.rating === 'good') doc.setTextColor(107, 158, 110);
      else if (r.rating === 'ok') doc.setTextColor(201, 168, 90);
      else if (r.rating === 'work') doc.setTextColor(201, 122, 79);
      doc.text(ratingTxt, W - M, y + 4, { align: 'right' });
      y += 6;
      // 對被勾選的每個方法：印「方法名稱」+ 該方法的 steps
      const itMethods = itemMap[r.name] || [];
      const checkedNames = r.methods || [];
      checkedNames.forEach(mn => {
        const m = itMethods.find(im => im.name === mn);
        doc.setFontSize(9);
        doc.setTextColor(139, 111, 71);
        doc.text(`> Method: ${mn}`, M + 6, y + 3);
        y += 5;
        if (m && m.steps && m.steps.trim()) {
          doc.setTextColor(107, 84, 53);
          const stepLines = doc.splitTextToSize(m.steps.trim(), W - M*2 - 12);
          doc.text(stepLines, M + 12, y + 1);
          y += stepLines.length * 4 + 2;
        }
        if (y > 270) { doc.addPage(); y = M; }
      });
      // Pet note
      if (r.petNote && r.petNote.trim()) {
        doc.setFontSize(9);
        doc.setTextColor(139, 111, 71);
        doc.text(`[For ${pet.name}]`, M + 6, y + 3);
        const noteLines = doc.splitTextToSize(r.petNote.trim(), W - M*2 - 30);
        doc.text(noteLines, M + 30, y + 3);
        y += 3 + noteLines.length * 4 + 2;
      }
      if (y > 270) { doc.addPage(); y = M; }
    });
  }
  y += 4;

  // Homework
  if (sess.homework) {
    doc.setTextColor(61, 47, 31);
    doc.setFontSize(11);
    doc.text('本週飼主作業 / Homework', M, y);
    y += 5;
    doc.line(M, y, W - M, y);
    y += 4;
    doc.setFontSize(10);
    const lines = doc.splitTextToSize(sess.homework, W - M*2);
    doc.text(lines, M + 2, y + 4);
    y += 4 + lines.length * 5;
  }

  // Footer
  doc.setFontSize(8);
  doc.setTextColor(150, 130, 100);
  doc.text('Wendy 溫蒂．貓與狗訓練日常', M, 287);

  const fname = `${pet.name}_${sess.date}.pdf`;
  doc.save(fname);
  showNotice('已下載 ' + fname);
}

/* ============== GIST SHARE ============== */
async function shareToGist(sess, pet) {
  const settings = load(KEYS.settings, {});
  if (!settings.githubPat) {
    showNotice('請先到設定填入 GitHub PAT', 'err');
    return;
  }
  // 把該項目「被勾選的方法」連同 steps 一起嵌入 record，飼主端看得到
  const items = ensureItemShape(pet.species === 'cat' ? load(KEYS.itemsCat, []) : load(KEYS.itemsDog, []));
  const itemMap = {};
  items.forEach(it => { itemMap[it.name] = it.methods || []; });
  const enrichedRecords = (sess.records || []).map(r => {
    const itMethods = itemMap[r.name] || [];
    const checkedNames = r.methods || [];
    const methodDetails = checkedNames.map(mn => {
      const m = itMethods.find(im => im.name === mn);
      return { name: mn, steps: (m && m.steps) || '' };
    });
    return { ...r, methodDetails };
  });
  const payload = {
    pet: {
      name: pet.name, species: pet.species, breed: pet.breed,
      gender: pet.gender, neutered: pet.neutered, birth: pet.birth,
      ownerName: pet.ownerName,
    },
    session: {
      date: sess.date, location: sess.location, duration: sess.duration,
      records: enrichedRecords, homework: sess.homework,
    },
    brand: 'Wendy 溫蒂．貓與狗訓練日常',
    generated: new Date().toISOString(),
  };
  const body = {
    description: `Wendy Pet Training Report - ${pet.name} ${sess.date}`,
    public: false,
    files: { 'report.json': { content: JSON.stringify(payload, null, 2) } },
  };

  showNotice('上傳中⋯');
  try {
    let resp;
    if (sess.gistId) {
      resp = await fetch(`https://api.github.com/gists/${sess.gistId}`, {
        method: 'PATCH',
        headers: {
          'Authorization': `Bearer ${settings.githubPat}`,
          'Accept': 'application/vnd.github+json',
        },
        body: JSON.stringify(body),
      });
    } else {
      resp = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${settings.githubPat}`,
          'Accept': 'application/vnd.github+json',
        },
        body: JSON.stringify(body),
      });
    }
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`GitHub ${resp.status}: ${err.slice(0,200)}`);
    }
    const gist = await resp.json();
    sess.gistId = gist.id;
    const sessions = load(KEYS.sessions, []);
    const idx = sessions.findIndex(s => s.id === sess.id);
    sessions[idx] = sess;
    save(KEYS.sessions, sessions);

    const pagesBase = `https://${settings.githubUser}.github.io/${settings.githubRepo}`;
    const reportUrl = `${pagesBase}/report.html#gist=${gist.id}`;
    showShareModal(reportUrl, gist.html_url);
  } catch (e) {
    showNotice('上傳失敗：' + e.message, 'err');
  }
}

function showShareModal(reportUrl, gistUrl) {
  const html = `
    <div class="modal">
      <h2>🔗 分享連結已產生</h2>
      <div class="notice ok">把下面這個連結貼給飼主，他點開就能看當堂報告。</div>
      <div class="field">
        <label>飼主檢視連結（建議貼這個）</label>
        <input id="shareUrl" type="text" readonly value="${escapeAttr(reportUrl)}">
      </div>
      <div class="field">
        <label>原始 Gist 連結</label>
        <input type="text" readonly value="${escapeAttr(gistUrl)}">
      </div>
      <div class="modal-actions">
        <button class="btn ghost" id="m_close">關閉</button>
        <button class="btn" id="m_copy">複製連結</button>
      </div>
    </div>
  `;
  const overlay = openModal(html);
  overlay.querySelector('#m_close').onclick = () => overlay.remove();
  overlay.querySelector('#m_copy').onclick = async () => {
    try {
      await navigator.clipboard.writeText(reportUrl);
      showNotice('已複製到剪貼簿');
    } catch {
      overlay.querySelector('#shareUrl').select();
      document.execCommand('copy');
      showNotice('已複製');
    }
  };
}

/* ============== VIEW: SETTINGS ============== */
function renderSettings() {
  const main = document.getElementById('main');
  const s = load(KEYS.settings, {});
  const dogItems = load(KEYS.itemsDog, []);
  const catItems = load(KEYS.itemsCat, []);

  main.innerHTML = `
    <div class="autosave-banner">
      💾 訓練項目區會<b>自動儲存</b>（離開欄位即存）。GitHub 設定要按下方「儲存設定」鈕。
    </div>
    <h3 style="color:var(--brown-dark); margin: 4px 0 10px; font-size:15px">GitHub 同步</h3>
    <div class="card" style="cursor:default">
      <div class="field">
        <label>GitHub Personal Access Token（gist 權限）</label>
        <input id="s_pat" type="password" value="${escapeAttr(s.githubPat||'')}" placeholder="ghp_...">
      </div>
      <div class="row2">
        <div class="field">
          <label>GitHub User</label>
          <input id="s_user" type="text" value="${escapeAttr(s.githubUser||'')}">
        </div>
        <div class="field">
          <label>GitHub Repo（host report.html）</label>
          <input id="s_repo" type="text" value="${escapeAttr(s.githubRepo||'')}">
        </div>
      </div>
      <button class="btn" id="s_save">儲存設定</button>
      <p class="card-meta" style="margin-top:10px">
        💡 PAT 只存在這台裝置的 localStorage，不會上傳。產生分享連結時用來建立 secret gist；
        飼主開連結時匿名讀取，不需 PAT。
      </p>
    </div>

    <h3 style="color:var(--brown-dark); margin: 24px 0 10px; font-size:15px">訓練項目清單</h3>
    <div class="tabs">
      <button class="tab active" data-tab="dog">🐶 狗 (${dogItems.length})</button>
      <button class="tab" data-tab="cat">🐱 貓 (${catItems.length})</button>
    </div>
    <div id="itemEditor"></div>

    <h3 style="color:var(--brown-dark); margin: 24px 0 10px; font-size:15px">資料管理</h3>
    <div class="card" style="cursor:default">
      <div class="actions-row">
        <button class="btn ghost" id="exportData">匯出全部資料 (JSON)</button>
        <button class="btn ghost" id="importData">匯入 JSON</button>
        <button class="btn danger" id="resetItems">重設清單為預設</button>
      </div>
      <p class="card-meta" style="margin-top:10px">
        匯出可備份，匯入會覆蓋現有資料。重設清單只會還原訓練項目，寵物與課程不受影響。
      </p>
    </div>
  `;

  document.getElementById('s_save').onclick = () => {
    save(KEYS.settings, {
      githubPat: document.getElementById('s_pat').value.trim(),
      githubUser: document.getElementById('s_user').value.trim(),
      githubRepo: document.getElementById('s_repo').value.trim(),
    });
    showNotice('設定已儲存');
  };

  // Tab switching for item editor
  let currentTab = 'dog';
  function renderItemEditor() {
    const key = currentTab === 'dog' ? KEYS.itemsDog : KEYS.itemsCat;
    const list = ensureItemShape(load(key, []));

    function methodHtml(m, i, j) {
      return `
        <div class="method-block">
          <div class="method-top">
            <input data-i="${i}" data-j="${j}" data-mfield="name" value="${escapeAttr(m.name)}" placeholder="方法名稱（例：手勢引導 / 響片）">
            <button class="small-btn danger" data-mdel="${i}_${j}">刪</button>
          </div>
          <textarea data-i="${i}" data-j="${j}" data-mfield="steps"
            placeholder="（可選）這個方法的步驟，例：1. 食物在鼻子前  2. 慢慢往頭頂移..."
            rows="2">${escapeHtml(m.steps)}</textarea>
        </div>`;
    }

    document.getElementById('itemEditor').innerHTML = `
      <div class="card" style="cursor:default">
        <p class="card-meta" style="margin-bottom:10px">
          💡 每個訓練項目下可加多個「訓練方法」，每個方法有自己的步驟。
          上課時可勾選今天用了哪些方法，飼主端會看到對應步驟當回家功課指引。
        </p>
        ${list.map((it, i) => `
          <div class="item-edit-block">
            <div class="item-edit-top">
              <input data-i="${i}" data-field="name" value="${escapeAttr(it.name)}" placeholder="訓練項目名稱">
              <button class="small-btn" data-up="${i}" ${i===0?'disabled':''}>↑</button>
              <button class="small-btn danger" data-del="${i}">刪</button>
            </div>
            <div class="methods-wrap">
              ${(it.methods || []).map((m, j) => methodHtml(m, i, j)).join('')}
              <button class="small-btn add-method" data-addmethod="${i}">＋ 新增方法</button>
            </div>
          </div>
        `).join('')}
        <button class="btn ghost" id="addItem" style="margin-top:8px">＋ 新增訓練項目</button>
      </div>
    `;

    function updateItemField(i, field, value) {
      const cur = ensureItemShape(load(key, []));
      cur[i][field] = (field === 'name') ? value.trim() : value;
      save(key, cur);
    }
    function updateMethodField(i, j, field, value) {
      const cur = ensureItemShape(load(key, []));
      cur[i].methods[j][field] = (field === 'name') ? value.trim() : value;
      save(key, cur);
    }

    document.querySelectorAll('#itemEditor input[data-field]').forEach(inp => {
      inp.onchange = () => updateItemField(parseInt(inp.dataset.i), inp.dataset.field, inp.value);
    });
    document.querySelectorAll('#itemEditor input[data-mfield]').forEach(inp => {
      inp.onchange = () => updateMethodField(parseInt(inp.dataset.i), parseInt(inp.dataset.j), inp.dataset.mfield, inp.value);
    });
    document.querySelectorAll('#itemEditor textarea[data-mfield]').forEach(ta => {
      ta.onchange = () => updateMethodField(parseInt(ta.dataset.i), parseInt(ta.dataset.j), ta.dataset.mfield, ta.value);
    });
    document.querySelectorAll('[data-del]').forEach(btn => {
      btn.onclick = () => {
        const i = parseInt(btn.dataset.del);
        const cur = ensureItemShape(load(key, []));
        if (!confirm(`刪除「${cur[i].name}」整個項目？`)) return;
        cur.splice(i, 1);
        save(key, cur);
        renderItemEditor();
      };
    });
    document.querySelectorAll('[data-mdel]').forEach(btn => {
      btn.onclick = () => {
        const [i, j] = btn.dataset.mdel.split('_').map(Number);
        const cur = ensureItemShape(load(key, []));
        cur[i].methods.splice(j, 1);
        save(key, cur);
        renderItemEditor();
      };
    });
    document.querySelectorAll('[data-addmethod]').forEach(btn => {
      btn.onclick = () => {
        const i = parseInt(btn.dataset.addmethod);
        const cur = ensureItemShape(load(key, []));
        cur[i].methods.push({ name: '', steps: '' });
        save(key, cur);
        renderItemEditor();
      };
    });
    document.querySelectorAll('[data-up]').forEach(btn => {
      btn.onclick = () => {
        const i = parseInt(btn.dataset.up);
        if (i === 0) return;
        const cur = ensureItemShape(load(key, []));
        [cur[i-1], cur[i]] = [cur[i], cur[i-1]];
        save(key, cur);
        renderItemEditor();
      };
    });
    document.getElementById('addItem').onclick = () => {
      const cur = ensureItemShape(load(key, []));
      cur.push({ name: '新項目', methods: [] });
      save(key, cur);
      renderItemEditor();
    };
  }
  document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentTab = t.dataset.tab;
      renderItemEditor();
    };
  });
  renderItemEditor();

  // Data management
  document.getElementById('exportData').onclick = () => {
    const dump = {
      version: 1,
      pets: load(KEYS.pets, []),
      sessions: load(KEYS.sessions, []),
      itemsCat: load(KEYS.itemsCat, []),
      itemsDog: load(KEYS.itemsDog, []),
      exportedAt: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `petcare-backup-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  document.getElementById('importData').onclick = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = async () => {
      const file = input.files[0];
      if (!file) return;
      try {
        const data = JSON.parse(await file.text());
        if (!confirm('匯入會覆蓋現有資料，確定？')) return;
        if (data.pets) save(KEYS.pets, data.pets);
        if (data.sessions) save(KEYS.sessions, data.sessions);
        if (data.itemsCat) save(KEYS.itemsCat, data.itemsCat);
        if (data.itemsDog) save(KEYS.itemsDog, data.itemsDog);
        showNotice('匯入完成');
        render();
      } catch (e) {
        showNotice('匯入失敗：' + e.message, 'err');
      }
    };
    input.click();
  };
  document.getElementById('resetItems').onclick = () => {
    if (!confirm('將兩份清單還原為預設？你的自訂項目會消失。')) return;
    save(KEYS.itemsDog, DEFAULT_DOG_ITEMS);
    save(KEYS.itemsCat, DEFAULT_CAT_ITEMS);
    render();
  };
}

/* ============== HELPERS ============== */
function openModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = html;
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
  return overlay;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

/* ============== RENDER ============== */
function render() {
  updateHeader();
  if (state.view === 'pets') renderPets();
  else if (state.view === 'sessions') renderSessions();
  else if (state.view === 'session') renderSession();
  else if (state.view === 'settings') renderSettings();
}

initStorage();
render();
</script>
