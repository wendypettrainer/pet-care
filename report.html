<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訓練報告 · Wendy 溫蒂．貓與狗訓練日常</title>
<style>
  :root {
    --bg: #f0e6d6;
    --bg-soft: #f7f0e3;
    --brown: #8b6f47;
    --brown-dark: #6b5435;
    --brown-light: #c9b693;
    --text: #3d2f1f;
    --text-soft: #6b5435;
    --good: #6b9e6e;
    --ok: #c9a85a;
    --work: #c97a4f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                 "Microsoft JhengHei", sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }
  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }
  header.brand {
    background: var(--bg);
    padding: 24px 16px 16px;
    margin: 0 -16px 16px;
    text-align: center;
    border-bottom: 2px solid var(--brown);
  }
  header.brand img {
    max-width: 320px;
    width: 80%;
    height: auto;
  }
  header.brand .sub {
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 8px;
    letter-spacing: 1px;
  }
  .pet-card {
    background: var(--bg-soft);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 18px;
    box-shadow: 0 2px 8px rgba(139,111,71,0.15);
  }
  .pet-name {
    font-size: 22px;
    font-weight: 600;
    color: var(--brown-dark);
    margin-bottom: 4px;
  }
  .pet-meta {
    font-size: 13px;
    color: var(--text-soft);
  }
  .session-meta {
    display: flex;
    gap: 14px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--brown-light);
    font-size: 13px;
    color: var(--text-soft);
    flex-wrap: wrap;
  }
  h2 {
    color: var(--brown-dark);
    font-size: 16px;
    margin: 24px 0 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--brown-light);
  }
  .item {
    background: var(--bg-soft);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .item-name { font-weight: 500; flex: 1; }
  .item-steps, .item-petnote, .item-method {
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .item-steps {
    padding-top: 8px;
    border-top: 1px dashed var(--brown-light);
    color: var(--text-soft);
    white-space: pre-wrap;
  }
  .item-method {
    padding: 8px 10px;
    background: white;
    border-radius: 6px;
    border-left: 3px solid var(--brown);
    margin-top: 6px;
  }
  .item-method-steps {
    margin-top: 4px;
    color: var(--text-soft);
    white-space: pre-wrap;
  }
  .item-petnote {
    color: var(--brown-dark);
    background: rgba(201, 182, 147, 0.25);
    padding: 8px 10px;
    border-radius: 6px;
    margin-top: 6px;
    white-space: pre-wrap;
  }
  .item-label {
    font-size: 11px;
    color: var(--brown);
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .rating {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    color: white;
    white-space: nowrap;
  }
  .rating.good { background: var(--good); }
  .rating.ok { background: var(--ok); }
  .rating.work { background: var(--work); }
  .rating.none { background: var(--brown-light); color: var(--brown-dark); }
  .homework {
    background: var(--bg-soft);
    border-left: 4px solid var(--brown);
    padding: 14px 16px;
    border-radius: 8px;
    white-space: pre-wrap;
    line-height: 1.7;
  }
  .footer {
    text-align: center;
    margin-top: 32px;
    padding-top: 20px;
    font-size: 12px;
    color: var(--text-soft);
    border-top: 1px solid var(--brown-light);
  }
  .loading, .err {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
  }
  .err { color: var(--work); }
</style>
</head>
<body>
<div class="page">
  <header class="brand">
    <img src="logo.png" alt="Wendy 溫蒂．貓與狗訓練日常"
         onerror="this.outerHTML='<h1 style=&quot;color:var(--brown-dark);font-size:18px&quot;>Wendy 溫蒂．貓與狗訓練日常</h1>'">
    <div class="sub">Cat &amp; Dog Training Session Report</div>
  </header>
  <div id="content"><div class="loading">載入中⋯</div></div>
</div>
<script>
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function fmtDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${y} 年 ${parseInt(m)} 月 ${parseInt(d)} 日`;
}

function ratingLabel(r) {
  if (r === 'good') return { cls: 'good', txt: '😊 表現好' };
  if (r === 'ok') return { cls: 'ok', txt: '😐 普通' };
  if (r === 'work') return { cls: 'work', txt: '💪 需加強' };
  return { cls: 'none', txt: '已練習' };
}

function getGistId() {
  const hash = window.location.hash.slice(1);
  const params = new URLSearchParams(hash);
  return params.get('gist') || '';
}

async function loadReport() {
  const id = getGistId();
  const el = document.getElementById('content');
  if (!id) {
    el.innerHTML = `<div class="err">⚠️ 連結缺少 gist 參數</div>`;
    return;
  }
  try {
    const r = await fetch(`https://api.github.com/gists/${id}`);
    if (!r.ok) throw new Error(`找不到報告 (${r.status})`);
    const gist = await r.json();
    const file = gist.files['report.json'];
    if (!file) throw new Error('報告格式錯誤');
    let content = file.content;
    if (file.truncated && file.raw_url) {
      const rr = await fetch(file.raw_url);
      content = await rr.text();
    }
    const data = JSON.parse(content);
    renderReport(data);
  } catch (e) {
    el.innerHTML = `<div class="err">⚠️ 載入失敗<br><small>${escapeHtml(e.message)}</small></div>`;
  }
}

function renderReport(data) {
  const { pet, session } = data;
  const el = document.getElementById('content');

  const records = (session.records || []).filter(r => r.selected);
  const itemsHtml = records.length === 0
    ? `<p style="color:var(--text-soft); text-align:center; padding: 16px">本堂課暫無項目記錄</p>`
    : records.map(r => {
        const lab = ratingLabel(r.rating);
        const petNote = (r.petNote || '').trim();
        // 新版：r.methodDetails = [{name, steps}]
        const methodDetails = Array.isArray(r.methodDetails) ? r.methodDetails : [];
        const methodsHtml = methodDetails.map(md => {
          const stepsTxt = (md.steps || '').trim();
          return `
            <div class="item-method">
              <div class="item-label">🎯 方法：${escapeHtml(md.name || '（未命名方法）')}</div>
              ${stepsTxt ? `<div class="item-method-steps">${escapeHtml(stepsTxt)}</div>` : ''}
            </div>`;
        }).join('');
        // 向下相容舊版 r.steps
        const legacySteps = (r.steps || '').trim();
        const legacyHtml = (!methodDetails.length && legacySteps)
          ? `<div class="item-steps">
               <div class="item-label">📋 在家練習步驟</div>
               ${escapeHtml(legacySteps)}
             </div>`
          : '';
        const noteHtml = petNote
          ? `<div class="item-petnote">
               <div class="item-label">💭 針對 ${escapeHtml(pet.name)} 的調整</div>
               ${escapeHtml(petNote)}
             </div>`
          : '';
        return `
          <div class="item">
            <div class="item-row">
              <span class="item-name">${escapeHtml(r.name)}</span>
              <span class="rating ${lab.cls}">${lab.txt}</span>
            </div>
            ${methodsHtml}
            ${legacyHtml}
            ${noteHtml}
          </div>`;
      }).join('');

  const homeworkHtml = session.homework
    ? `<h2>📝 本週飼主作業</h2>
       <div class="homework">${escapeHtml(session.homework)}</div>`
    : '';

  const genderTxt = pet.gender === 'male' ? '♂' : pet.gender === 'female' ? '♀' : '';
  const neuteredTxt = pet.neutered === 'yes' ? '已絕育' : pet.neutered === 'no' ? '未絕育' : '';
  const metaParts = [
    pet.breed || (pet.species==='cat'?'貓':'狗'),
    genderTxt,
    neuteredTxt,
    pet.birth,
  ].filter(Boolean).join(' · ');
  el.innerHTML = `
    <div class="pet-card">
      <div class="pet-name">${pet.species==='cat'?'🐱':'🐶'} ${escapeHtml(pet.name)}</div>
      <div class="pet-meta">
        ${escapeHtml(metaParts)}
        ${pet.ownerName ? ' · 飼主：' + escapeHtml(pet.ownerName) : ''}
      </div>
      <div class="session-meta">
        <span>📅 ${fmtDate(session.date)}</span>
        ${session.location ? `<span>📍 ${escapeHtml(session.location)}</span>` : ''}
        ${session.duration ? `<span>⏱ ${session.duration} 分鐘</span>` : ''}
      </div>
    </div>

    <h2>🎯 本堂訓練項目</h2>
    ${itemsHtml}

    ${homeworkHtml}

    <div class="footer">
      Wendy 溫蒂．貓與狗訓練日常<br>
      <small>產出時間：${new Date(data.generated).toLocaleString('zh-TW')}</small>
    </div>
  `;
  document.title = `${pet.name} ${session.date} · 訓練報告`;
}

loadReport();
</script>
</body>
</html>
